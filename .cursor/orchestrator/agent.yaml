id: orchestrator
name: Platform Orchestrator
type: platform
contract_version: "1.0"
description: Central routing agent for task decomposition, agent selection, parallel execution, and failure recovery.
path: .cursor/orchestrator/AGENT.md
entry: .cursor/orchestrator/orchestrator.js
config: .cursor/orchestrator/config.yaml
priority: critical

dependencies:
  agents: []
  shared:
    - shared/workflow
    - shared/logging
    - shared/validation

required_mcps:
  recommended:
    - filesystem-mcp
    - git-mcp
    - shell-mcp

skills:
  required:
    - path: .cursor/skills/teknovo-chief-architect/SKILL.md
      id: teknovo-chief-architect
    - path: .cursor/skills/superpowers/dispatching-parallel-agents/SKILL.md
      id: superpowers-dispatching-parallel-agents
  recommended:
    - path: .cursor/skills/teknovo-mcp-stack/SKILL.md
      id: teknovo-mcp-stack

routing_keywords:
  - orchestrate
  - route task
  - dispatch agent
  - multi-agent
  - parallel agents
  - workflow
  - coordination

failure_recovery:
  max_retries: 10
  policy: .cursor/gates/execution/execution-registry.yaml
  isolate_failures: true
  continue_unaffected: true
