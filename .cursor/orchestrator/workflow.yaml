id: orchestrator
name: Platform Orchestrator Workflows

patterns:
  feature_delivery_parallel:
    description: Frontend + Backend parallel, then Testing
    type: sequential
    steps:
      - id: build
        type: parallel
        agents:
          - platform-frontend
          - platform-backend
      - id: verify
        type: agent
        agent: platform-testing
        depends_on: [build]

  deploy_chain:
    description: Frontend → Testing → Cloudflare
    type: sequential
    steps:
      - id: frontend
        agent: platform-frontend
      - id: testing
        agent: platform-testing
        depends_on: [frontend]
      - id: cloudflare
        agent: platform-cloudflare
        depends_on: [testing]

  github_release:
    description: Testing → GitHub PR → DevOps
    type: sequential
    steps:
      - id: testing
        agent: platform-testing
      - id: github
        agent: platform-github
        depends_on: [testing]
      - id: devops
        agent: platform-devops
        depends_on: [github]

  conditional_deploy:
    description: Deploy only when tests pass
    type: conditional
    condition: "context.testResults?.success === true"
    then:
      - agent: platform-cloudflare
    else:
      - agent: platform-testing

failure_recovery:
  max_retries: 10
  isolate_failures: true
  continue_unaffected: true
  policy: .cursor/gates/execution/execution-registry.yaml
