# Teknovo Skill Registry — Central Orchestration Layer
# Single source of truth for skill discovery, layers, priorities, activation, dependencies, conflicts.
# Legacy backward compatibility: .cursor/registry/legacy-registry.yaml (autoload synced from here)
# Governance: .cursor/docs/ai/skill-governance.md | Inventory: .cursor/docs/ai/skill-inventory.md
# Validate: .cursor/runtime/load-skills.py --validate

version: 1.0.0
metadata:
  name: Teknovo Skill Registry
  description: Central orchestration layer for the Teknovo AI SuperStack
  last_updated: '2026-06-20'
  maintainer: Teknovo AI SuperStack
  legacy_registry: .cursor/registry/legacy-registry.yaml
  agent_registry: .cursor/registry/agent-registry.yaml
  mcp_registry: .cursor/registry/mcp-registry.yaml
  governance_doc: .cursor/docs/ai/skill-governance.md
  inventory_doc: .cursor/docs/ai/skill-inventory.md
layers:
  execution:
    order: 0
    description: Execution mode, failure recovery, branch safety, deployment execution
      (V2)
  foundation:
    order: 1
    description: Master contracts, AGENTS.md, workstation bootstrap
  memory:
    order: 2
    description: Long-term Claude-Mem artifacts and episodic session context
  product:
    order: 3
    description: PRD, product design, domain modules, planning methodology
  ux:
    order: 4
    description: UI/UX implementation, design taste, copy, landing pages
  architecture:
    order: 5
    description: Chief architect gate, database, API, DDD, monorepo governance
  engineering:
    order: 6
    description: Implementation, TDD, backend, migrations, performance
  security:
    order: 7
    description: Security principles, RBAC security, security review gate
  assurance:
    order: 8
    description: Trail-of-Bits-inspired verification, context, differential review
  deployment:
    order: 9
    description: DevOps, Cloudflare, ship, observability, incidents
  automation:
    order: 10
    description: Subagents, parallel dispatch, git worktrees
  review:
    order: 11
    description: Quality gates, taste review, eng-review, QA, code review
  mcp:
    order: 12
    description: Model Context Protocol integrations and agent tool boundaries
priority_levels:
  critical: Mandatory every session or gate-blocking
  high: Autoload or phase-gate recommended
  medium: Trigger-based on-demand loading
  optional: Specialist, domain, or experimental use
conflict_resolution:
  precedence_chain: AGENTS.md > ADR > PRD > Teknovo Skills > Security > Assurance
    > Impeccable > Taste > External
  document_priority:
  - AGENTS.md and docs/adr/**
  - Master PRD (docs/prd/master/master-prd.md)
  - Teknovo standards (database, API, RBAC, design system, coding)
  - .cursor/registry/skill-registry.yaml
  - Sub-registries (taste, quality, security, assurance, memory)
  - .cursor/registry/legacy-registry.yaml
  - External guidance
  skill_conflicts:
  - id: taste-vs-expansion
    when: Taste recommends removal vs feature expansion
    winner: taste
    rule: Taste wins â€” simplify or cut scope before polishing
  - id: security-vs-convenience
    when: Security requirement vs developer convenience
    winner: security
    rule: Security wins â€” no bypass for speed
  - id: agents-vs-external
    when: AGENTS.md vs external blog or tool defaults
    winner: agents-md
    rule: AGENTS.md wins â€” Teknovo contracts override external patterns
  - id: assurance-vs-assumption
    when: Assurance gate vs assumed requirements
    winner: assurance
    rule: Assurance wins â€” clarify before implement
  - id: rbac-vs-ui-only-auth
    when: UI-only permission check vs server RBAC
    winner: security
    rule: Server RBAC mandatory â€” UI checks are supplemental only
  review_order:
  - requirement-clarifier
  - context-builder
  - taste-reviewer
  - security-reviewer
  - impeccable-reviewer
  - differential-reviewer
  - second-opinion-reviewer
sub_registries:
  taste:
    path: .cursor/gates/taste/taste-registry.yaml
    prefix: taste-
  quality:
    path: .cursor/gates/quality/quality-registry.yaml
    prefix: quality-
  security:
    path: .cursor/gates/security/security-registry.yaml
    prefix: security-
  memory:
    path: .cursor/docs/memory/memory-registry.yaml
    prefix: memory-
  assurance:
    path: .cursor/gates/assurance/assurance-registry.yaml
    prefix: assurance-
