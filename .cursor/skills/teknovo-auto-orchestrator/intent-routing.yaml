      - endpoint
      - rest api
      - openapi
      - swagger
      - controller
      - webhook
    patterns:
      - "add.*endpoint"
      - "create.*api"
      - "implement.*route"
    chain_ref: api-only
    priority: 8
    required_gates:
      - assurance
      - security_pre_impl
