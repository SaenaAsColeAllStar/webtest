      - "ship.*production"
      - "release.*staging"
    chain_ref: pre-ship
    priority: 25
    overlay: true
    required_gates:
      - security_pre_deploy
      - quality
      - branch_safety

  - id: generic-feature
    keywords:
      - build
      - implement
      - create
      - develop
      - make
      - setup
      - add feature
      - new feature
      - build feature
      - build system
    patterns:
      - "implement.*feature"
      - "build.*module"
    chain_ref: generic-feature
    priority: 1
    fallback: true
    required_gates:
