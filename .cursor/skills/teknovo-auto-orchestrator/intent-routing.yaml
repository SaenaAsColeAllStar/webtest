      - schema change
      - drizzle
      - alter table
      - database migration
      - seed data
      - data migration
    patterns:
      - "add.*migration"
      - "schema.*change"
    chain_ref: migration
    priority: 12
    required_gates:
      - assurance
      - security_pre_impl
      - branch_safety

# Multi-intent resolution: highest priority wins; ties broken by keyword score
resolution:
  min_keyword_score: 1
  multi_domain_parallel_threshold: 3
  deploy_overlay_chain: pre-ship

