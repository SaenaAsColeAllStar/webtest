# Runs on pull requests and pushes to main — build and lint only (no deploy).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
